<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ATELA · 촬영 없이, 브랜드가 된다.</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="LogoCloud.jsx"></script>
<script type="text/babel" src="Features.jsx"></script>
<script type="text/babel" src="BeforeAfter.jsx"></script>
<script type="text/babel" src="Stats.jsx"></script>
<script type="text/babel" src="CaseStudy.jsx"></script>
<script type="text/babel" src="Pricing.jsx"></script>
<script type="text/babel" src="FinalCta.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroVariant": "split",
  "accent": "#C6FF3D"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = React.useState(() => {
    try { return { ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem('atela-tweaks') || '{}') }; }
    catch { return TWEAK_DEFAULTS; }
  });
  const [showTweaks, setShowTweaks] = React.useState(false);

  React.useEffect(() => { localStorage.setItem('atela-tweaks', JSON.stringify(tweaks)); }, [tweaks]);

  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || !e.data.type) return;
      if (e.data.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const set = (k, v) => {
    setTweaks(t => ({ ...t, [k]: v }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  return (
    <>
      <Nav/>
      <Hero variant={tweaks.heroVariant} accent={tweaks.accent}/>
      <LogoCloud/>
      <Features/>
      <BeforeAfter/>
      <Stats/>
      <CaseStudy/>
      <Pricing/>
      <FinalCta/>
      <Footer/>

      {showTweaks && (
        <div className="tweaks-panel">
          <h4>Tweaks <span style={{color:'#C6FF3D'}}>●</span></h4>
          <label>Hero variant</label>
          <div className="seg">
            {['split','typographic','fullbleed'].map(v => (
              <button key={v} className={tweaks.heroVariant===v?'on':''} onClick={()=>set('heroVariant', v)}>{v}</button>
            ))}
          </div>
          <label>Accent color</label>
          <div className="seg">
            {[['#C6FF3D','Lime'],['#FF3DA8','Mag'],['#6B3DFF','Violet']].map(([c,n])=>(
              <button key={c} className={tweaks.accent===c?'on':''} onClick={()=>set('accent', c)} style={tweaks.accent===c?{background:c,color:'#0a0a0a'}:{}}>{n}</button>
            ))}
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

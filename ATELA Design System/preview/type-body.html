<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Body + Mono + Eyebrow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--n-50); display: grid; gap: 14px; }
  .block { border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; background: #fff; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
</style></head>
<body>
  <div class="block">
    <div class="label">Eyebrow · 13/600 · +8% tracking</div>
    <span class="eyebrow">AI PRODUCT VISUALS FOR KOREAN COMMERCE</span>
  </div>
  <div class="block">
    <div class="label">Lead · 18/1.5</div>
    <p class="lead" style="margin:0">상품 한 장만 올리면, 브랜드 톤에 맞춘 이미지 50장을 3분 안에 만들어 드려요.</p>
  </div>
  <div class="block">
    <div class="label">Body · 16/1.55</div>
    <p style="margin:0">쿠팡, 29CM, 무신사까지 채널별 규격에 맞춰 자동 리사이즈. 모든 이미지는 브랜드 가이드와 자동 대조되어, 톤·컬러·크롭이 일관됩니다.</p>
  </div>
  <div class="block">
    <div class="label">Mono · 13</div>
    <code>12,400,000+ generated · 93% faster</code>
  </div>
</body></html>

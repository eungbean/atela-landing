<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--n-50); }
  .row { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
  .bar { background: var(--atela-ink); height: 14px; border-radius: 4px; }
  .k { min-width: 80px; }
</style></head>
<body>
  <div class="row"><span class="k">sp-1 · 4</span><span class="bar" style="width:4px"></span></div>
  <div class="row"><span class="k">sp-2 · 8</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="k">sp-3 · 12</span><span class="bar" style="width:12px"></span></div>
  <div class="row"><span class="k">sp-4 · 16</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="k">sp-6 · 24</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="k">sp-8 · 40</span><span class="bar" style="width:40px"></span></div>
  <div class="row"><span class="k">sp-10 · 80</span><span class="bar" style="width:80px"></span></div>
  <div class="row"><span class="k">sp-11 · 120</span><span class="bar" style="width:120px"></span></div>
</body></html>

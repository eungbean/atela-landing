<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--n-50); }
  .row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; }
  .s { aspect-ratio: 0.82; border-radius: 10px; padding: 8px; display: flex; flex-direction: column; justify-content: flex-end; border: 1px solid rgba(0,0,0,0.05); }
  .s .k { font-family: var(--font-mono); font-size: 10px; font-weight: 700; }
  .s .v { font-family: var(--font-mono); font-size: 9px; opacity: 0.65; }
</style></head>
<body>
  <div class="row">
    <div class="s" style="background:#FFFFFF;color:#0A0A0A"><div class="k">0</div><div class="v">#FFFFFF</div></div>
    <div class="s" style="background:#FAFAF7;color:#0A0A0A"><div class="k">50</div><div class="v">#FAFAF7</div></div>
    <div class="s" style="background:#F2F1EC;color:#0A0A0A"><div class="k">100</div><div class="v">#F2F1EC</div></div>
    <div class="s" style="background:#E6E4DD;color:#0A0A0A"><div class="k">200</div><div class="v">#E6E4DD</div></div>
    <div class="s" style="background:#CFCCC2;color:#0A0A0A"><div class="k">300</div><div class="v">#CFCCC2</div></div>
    <div class="s" style="background:#A8A59A;color:#fff"><div class="k">400</div><div class="v">#A8A59A</div></div>
    <div class="s" style="background:#7D7B73;color:#fff"><div class="k">500</div><div class="v">#7D7B73</div></div>
    <div class="s" style="background:#545248;color:#fff"><div class="k">600</div><div class="v">#545248</div></div>
    <div class="s" style="background:#363531;color:#fff"><div class="k">700</div><div class="v">#363531</div></div>
    <div class="s" style="background:#0A0A0A;color:#fff"><div class="k">900</div><div class="v">#0A0A0A</div></div>
  </div>
</body></html>

<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Radii + Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--n-50); display: grid; gap: 18px; }
  .row { display: flex; gap: 12px; align-items: flex-end; }
  .box { width: 80px; height: 56px; background: #fff; border: 1px solid var(--border); display: grid; place-items: center; font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); }
  .section-label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: -6px; }
</style></head>
<body>
  <div>
    <div class="section-label">Radii</div>
    <div class="row" style="margin-top:8px">
      <div class="box" style="border-radius:4px">xs 4</div>
      <div class="box" style="border-radius:8px">sm 8</div>
      <div class="box" style="border-radius:12px">md 12</div>
      <div class="box" style="border-radius:20px">lg 20</div>
      <div class="box" style="border-radius:28px">xl 28</div>
      <div class="box" style="border-radius:999px">pill</div>
    </div>
  </div>
  <div>
    <div class="section-label">Shadows</div>
    <div class="row" style="margin-top:8px; gap: 20px;">
      <div class="box" style="border-radius:14px; box-shadow: 0 1px 2px rgba(10,10,10,0.06); border:0">sh-1</div>
      <div class="box" style="border-radius:14px; box-shadow: 0 4px 12px rgba(10,10,10,0.08); border:0">sh-2</div>
      <div class="box" style="border-radius:14px; box-shadow: 0 12px 32px rgba(10,10,10,0.12); border:0">sh-3</div>
      <div class="box" style="border-radius:14px; box-shadow: 0 8px 24px rgba(198,255,61,0.45); border:0; background: #C6FF3D; color:#0A0A0A">lime</div>
    </div>
  </div>
</body></html>

<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Form</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--n-50); display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
  label { font-size: 12px; font-weight: 600; color: var(--fg-2); display: block; margin-bottom: 6px; letter-spacing: -0.005em; }
  .input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; background: #fff; font-family: var(--font-sans); font-size: 14px; box-sizing: border-box; transition: border 200ms var(--ease-out); }
  .input:focus { outline: none; border-color: var(--atela-ink); box-shadow: 0 0 0 3px #C6FF3D66; }
  .input.error { border-color: var(--err); }
  .help { font-size: 12px; color: var(--fg-3); margin-top: 4px; }
  .help.err { color: var(--err); }
  .chk { display: flex; align-items: center; gap: 10px; font-size: 14px; cursor: pointer; }
  .chk input { appearance: none; width: 18px; height: 18px; border: 1.5px solid var(--border-strong); border-radius: 4px; display: grid; place-items: center; cursor: pointer; }
  .chk input:checked { background: var(--atela-lime); border-color: var(--atela-ink); }
  .chk input:checked::after { content: "✓"; color: var(--atela-ink); font-weight: 800; font-size: 12px; }
  .seg { display: inline-flex; background: var(--n-100); border-radius: 999px; padding: 4px; gap: 2px; }
  .seg button { border: 0; background: transparent; padding: 8px 16px; border-radius: 999px; font-weight: 600; font-size: 13px; cursor: pointer; font-family: var(--font-sans); }
  .seg button.on { background: var(--atela-ink); color: #fff; }
</style></head>
<body>
  <div>
    <label>이메일</label>
    <input class="input" value="founder@atela.kr">
    <div class="help">비즈니스 이메일을 입력해주세요.</div>
  </div>
  <div>
    <label>비밀번호</label>
    <input class="input error" type="password" value="•••••">
    <div class="help err">8자 이상, 숫자 1개 포함</div>
  </div>
  <div>
    <label>브랜드</label>
    <select class="input"><option>무신사</option></select>
  </div>
  <div>
    <label>플랜</label>
    <div class="seg"><button>월간</button><button class="on">연간 · 2개월 무료</button></div>
  </div>
  <label class="chk"><input type="checkbox" checked>마케팅 수신 동의 (선택)</label>
  <label class="chk"><input type="checkbox">약관에 동의합니다</label>
</body></html>

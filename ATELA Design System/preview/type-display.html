<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Display Type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--n-50); }
  .row { display: flex; align-items: baseline; gap: 16px; margin-bottom: 12px; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); min-width: 120px; }
  .d1 { font-weight: 800; font-size: 80px; line-height: 0.95; letter-spacing: -0.03em; }
  .d2 { font-weight: 800; font-size: 52px; line-height: 0.98; letter-spacing: -0.03em; }
</style></head>
<body>
  <div class="row"><div class="label">Display 1 · 800</div><div class="d1">촬영 없이,<br>브랜드가 된다.</div></div>
  <div class="row"><div class="label">Display 2 · 800</div><div class="d2">Built for Korean commerce.</div></div>
</body></html>

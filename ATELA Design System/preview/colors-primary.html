<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Colors — Primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--n-50); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch { border-radius: 14px; padding: 14px; border: 1px solid var(--border); aspect-ratio: 1.6; display: flex; flex-direction: column; justify-content: space-between; }
  .swatch .name { font-weight: 700; font-size: 13px; letter-spacing: -0.01em; }
  .swatch .hex { font-family: var(--font-mono); font-size: 11px; opacity: 0.7; }
</style></head>
<body>
  <div class="grid">
    <div class="swatch" style="background:#C6FF3D;color:#0A0A0A"><div class="name">Lime / Signature</div><div class="hex">#C6FF3D</div></div>
    <div class="swatch" style="background:#0A0A0A;color:#fff;border-color:#0A0A0A"><div class="name">Ink</div><div class="hex">#0A0A0A</div></div>
    <div class="swatch" style="background:#D8FF6B;color:#0A0A0A"><div class="name">Lime / Bright</div><div class="hex">#D8FF6B</div></div>
    <div class="swatch" style="background:#9FD423;color:#0A0A0A"><div class="name">Lime / Deep</div><div class="hex">#9FD423</div></div>
    <div class="swatch" style="background:#141414;color:#fff;border-color:#141414"><div class="name">Ink 2</div><div class="hex">#141414</div></div>
    <div class="swatch" style="background:#1F1F1F;color:#fff;border-color:#1F1F1F"><div class="name">Ink 3</div><div class="hex">#1F1F1F</div></div>
    <div class="swatch" style="background:#FAFAF7;color:#0A0A0A"><div class="name">Bg / Warm-white</div><div class="hex">#FAFAF7</div></div>
    <div class="swatch" style="background:#FFFFFF;color:#0A0A0A"><div class="name">Raised / White</div><div class="hex">#FFFFFF</div></div>
  </div>
</body></html>
